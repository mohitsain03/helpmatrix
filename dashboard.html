<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>HelpMatrix - Dashboard</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<canvas id="particles-canvas"></canvas>

<!-- NAVBAR -->
<nav class="navbar" data-ocid="nav.panel">
  <a href="index.html" class="nav-logo">
    <img src="assets/generated/logo.svg" alt="HelpMatrix Logo"/>
    <span class="nav-logo-text">HelpMatrix</span>
  </a>
  <ul class="nav-links" id="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="index.html#categories">Categories</a></li>
    <li><a href="index.html#about">About</a></li>
    <!-- The initAuth script will populate Dashboard/Logout links here -->
    <li><a href="login.html" class="nav-cta">Login</a></li>
  </ul>
</nav>

<!-- DASHBOARD LAYOUT -->
<div class="dashboard-layout">
  
  <!-- SIDEBAR -->
  <div class="dashboard-sidebar">
    <div class="dashboard-userinfo">
      <div class="dash-avatar" id="dash-avatar">U</div>
      <div>
        <div style="font-weight:700;color:#fff;" id="dash-name">User Name</div>
        <div style="font-size:0.8rem;color:var(--text-muted);" id="dash-role">Consumer</div>
      </div>
    </div>
    
    <ul style="list-style:none;display:flex;flex-direction:column;gap:1rem;">
      <li><a href="#" style="color:#fff;text-decoration:none;font-weight:600;display:flex;align-items:center;gap:0.75rem;"><span style="color:var(--accent-blue);">📦</span> My Requests</a></li>
      <li><a href="index.html#categories" style="color:var(--text-muted);text-decoration:none;font-weight:500;display:flex;align-items:center;gap:0.75rem;"><span>🔍</span> Browse Catalog</a></li>
      <li><a href="#" style="color:var(--text-muted);text-decoration:none;font-weight:500;display:flex;align-items:center;gap:0.75rem;"><span>⚙️</span> Settings</a></li>
    </ul>
  </div>

  <!-- CONTENT -->
  <div class="dash-content">
    <h2 style="font-family:'Orbitron',monospace;font-size:2rem;margin-bottom:2rem;color:#fff;">Active Orders / Requests</h2>
    
    <div id="orders-container">
      <!-- Orders dynamically loaded here -->
    </div>
  </div>

</div>

<script src="main.js"></script>
<script>
  (() => {
    console.log("Dashboard IIFE Initializing...");

    const initDashboard = async () => {
      // 1. Load User Data from LocalStorage
      const userStr = localStorage.getItem('helpmatrix_user');
      console.log("LocalStorage helpmatrix_user:", userStr);

      if (!userStr) {
        console.warn("No user session found, redirecting to login.");
        window.location.href = 'login.html';
        return;
      }

      let user;
      try {
        user = JSON.parse(userStr);
        console.log("Parsed User Object:", user);
      } catch (e) {
        console.error("JSON parse failed for user session:", e);
        localStorage.removeItem('helpmatrix_user');
        window.location.href = 'login.html';
        return;
      }

      // 2. Populate Sidebar Info
      const nameEl = document.getElementById('dash-name');
      const roleEl = document.getElementById('dash-role');
      const avatarEl = document.getElementById('dash-avatar');

      console.log("Elements found:", { nameEl: !!nameEl, roleEl: !!roleEl, avatarEl: !!avatarEl });

      if (nameEl) nameEl.textContent = user.name || 'User';
      if (roleEl) roleEl.textContent = (user.role || '').toLowerCase() === 'provider' ? 'Provider Account' : 'Consumer Account';
      if (avatarEl) avatarEl.textContent = (user.name || 'U').charAt(0).toUpperCase();

      // 3. Build API Base
      const API_BASE = (window.location.port !== '3000' && (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:')) 
        ? 'http://localhost:3000' 
        : '';
      const userMobile = user.mobile || 'Unknown';
      const ordersContainer = document.getElementById('orders-container');

      if (!ordersContainer) {
        console.error("orders-container element not found in DOM!");
        return;
      }

      // 4. Fetch and Render Orders
      console.log(`Fetching orders for ${userMobile} from ${API_BASE}/api/orders/${userMobile}...`);
      try {
        const res = await fetch(`${API_BASE}/api/orders/${userMobile}`);
        if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
        const data = await res.json();
        
        console.log("API Response Data:", data);
        const orders = data.success ? data.orders : [];
        let totalAmount = 0;

        if (orders.length === 0) {
          ordersContainer.innerHTML = `
            <div style="text-align:center;padding:4rem 2rem;background:var(--glass-bg);border:1px dashed var(--glass-border);border-radius:16px;">
              <div style="font-size:3rem;margin-bottom:1rem;">📭</div>
              <h3 style="color:#fff;margin-bottom:0.5rem;">No Active Requests</h3>
              <p style="color:var(--text-muted);margin-bottom:1.5rem;">You haven't made any requests yet.</p>
              <a href="index.html#categories" class="btn-primary">Browse Services</a>
            </div>
          `;
          return;
        }

        const ordersHtml = [...orders].reverse().map(order => {
          const status = order.Status || 'Pending';
          const statusColor = status === 'Pending' ? '#eab308' : (status === 'Accepted' ? '#22c55e' : (status === 'Processing' ? '#3b82f6' : '#22c55e'));
          const oid = order.OrderID || 'N/A';
          const opriceStr = (order.Price || '0').toString();
          const oprice = parseFloat(opriceStr.replace(/[^0-9.]/g, '')) || 0;
          totalAmount += oprice;

          return `
            <div class="dash-card">
              <div>
                <div style="color:var(--text-muted);font-size:0.8rem;margin-bottom:0.25rem;">Order ID: <span style="font-family:monospace;color:#fff;">${oid}</span> • ${order.OrderDate || 'N/A'}</div>
                <h4>${order.Item || 'Unknown Item'}</h4>
                <p>Address: ${order.Address || 'N/A'} • Urgency: <strong style="color:var(--accent-red);">${order.Urgency || 'Normal'}</strong></p>
                <div style="margin-top:0.5rem;font-weight:700;color:var(--accent-cyan);">Price: ₹${oprice.toLocaleString()}</div>
              </div>
              <div style="text-align:right;">
                <span class="status" style="background:rgba(234, 179, 8, 0.15);color:${statusColor};display:block;margin-bottom:0.5rem;">${status === 'Accepted' ? 'Approved by Provider' : status}</span>
                ${status === 'Pending' ? `<button onclick="cancelOrder('${oid}')" style="background:rgba(239, 68, 68, 0.1); color:#ef4444; border:1px solid rgba(239, 68, 68, 0.2); padding:0.4rem 0.6rem; border-radius:6px; font-size:0.7rem; cursor:pointer; font-weight:600; width:100%;">Cancel Request</button>` : ''}
              </div>
            </div>
          `;
        }).join('');

        const summaryHtml = `
          <div class="dash-card" style="background:linear-gradient(135deg, rgba(59,130,246,0.1), rgba(6,182,212,0.1)); border-color:var(--accent-blue);">
            <div>
              <h3 style="color:#fff;margin-bottom:0.25rem;">Order Summary</h3>
              <p style="color:var(--text-muted);">Total requests across all categories</p>
            </div>
            <div style="text-align:right;">
              <div style="font-size:0.8rem;color:var(--text-muted);">Total Amount</div>
              <div style="font-size:1.8rem;font-weight:800;color:var(--accent-cyan);font-family:'Orbitron',monospace;">₹${totalAmount.toLocaleString()}</div>
            </div>
          </div>
        `;

        ordersContainer.innerHTML = summaryHtml + ordersHtml;
      } catch (err) {
        console.error("Order load error:", err);
        ordersContainer.innerHTML = `<p style="color:#ef4444;text-align:center;">Error loading orders: ${err.message}</p>`;
      }
    };

    // Execute immediately or when DOM ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initDashboard);
    } else {
      initDashboard();
    }
  })();

  window.cancelOrder = (orderId) => {
    if (!confirm('Are you sure you want to cancel this request?')) return;
    
    const API_BASE = (window.location.port !== '3000' && (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')) ? 'http://localhost:3000' : '';
    fetch(`${API_BASE}/api/orders/${orderId}/status`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'Cancelled' })
    })
    .then(res => res.json())
    .then(data => {
      if (data.success) {
        location.reload();
      } else {
        alert('Failed to cancel order: ' + (data.error || 'Unknown error'));
      }
    })
    .catch(err => {
      console.error("Cancel order error:", err);
      alert('Network error while cancelling order');
    });
  };

</script>
</body>
</html>
