<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>HelpMatrix - Provider Dashboard</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
  <style>
    .provider-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
    .stat-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px; padding: 1.5rem; text-align: center; }
    .stat-val { font-family: 'Orbitron', sans-serif; font-size: 2rem; color: var(--accent-cyan); margin: 0.5rem 0; }
    .section-title { margin: 3rem 0 1.5rem; display: flex; align-items: center; justify-content: space-between; }
  </style>
</head>
<body class="dashboard-body">
<canvas id="particles-canvas"></canvas>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="index.html" class="nav-logo">
    <img src="assets/generated/logo.svg" alt="Logo"/>
    <span class="nav-logo-text">HelpMatrix</span>
  </a>
  <div class="nav-user">
    <div class="user-info">
      <div class="user-name" id="dash-user-name">Provider Name</div>
      <div style="font-size:0.7rem;color:var(--text-muted);" id="dash-role">Provider Account</div>
    </div>
    <div class="user-avatar" id="dash-avatar">P</div>
    <a href="index.html" class="nav-cta" style="background:#ef4444;margin-left:1rem;padding:0.5rem 1rem;" onclick="localStorage.removeItem('helpmatrix_user')">Logout</a>
  </div>
</nav>

<div class="dashboard-container">
  <header class="dash-header">
    <h1>Welcome, <span id="welcome-name" style="color:var(--accent-blue);">Provider</span></h1>
    <p style="color:var(--text-muted);">Manage your listings and fulfill incoming requests.</p>
  </header>

  <!-- STATS -->
  <div class="provider-grid">
    <div class="stat-card">
      <div style="color:var(--text-muted);font-size:0.8rem;">My Requests</div>
      <div class="stat-val" id="stat-products">0</div>
    </div>
    <div class="stat-card">
      <div style="color:var(--text-muted);font-size:0.8rem;">Pending Orders</div>
      <div class="stat-val" id="stat-orders" style="color:var(--accent-red);">0</div>
    </div>
    <div class="stat-card">
      <div style="color:var(--text-muted);font-size:0.8rem;">Total Earnings</div>
      <div class="stat-val" id="stat-earnings" style="color:var(--accent-green);">₹0</div>
    </div>
  </div>

  <!-- PENDING ORDERS (INCOMING) -->
  <div class="section-title">
    <h2>Pending Orders <span style="font-size:0.9rem;font-weight:400;color:var(--text-muted);" id="orders-count">(0)</span></h2>
  </div>
  <div id="orders-container" class="orders-list">
    <!-- Orders load here -->
    <p style="color:var(--text-muted);text-align:center;padding:2rem;">Loading pending orders...</p>
  </div>

  <!-- MY REQUESTS (OUTGOING) -->
  <div class="section-title">
    <h2>My Requests <span style="font-size:0.9rem;font-weight:400;color:var(--text-muted);" id="products-count">(0)</span></h2>
  </div>
  <div id="products-container" class="orders-list">
    <!-- Consumer orders load here -->
    <p style="color:var(--text-muted);text-align:center;padding:2rem;">Loading your requests...</p>
  </div>
</div>



<script src="main.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const userStr = localStorage.getItem('helpmatrix_user');
    if (!userStr) { window.location.href = 'login.html'; return; }
    const user = JSON.parse(userStr);
    
    // Fill UI
    document.getElementById('dash-user-name').textContent = user.name;
    document.getElementById('welcome-name').textContent = user.name.split(' ')[0];
    document.getElementById('dash-avatar').textContent = (user.name || 'P').charAt(0).toUpperCase();

    const mobile = user.mobile;
    const API_BASE = window.location.protocol === 'file:' ? 'http://localhost:3000' : '';

    // 1. Load Incoming Orders
    fetch(`${API_BASE}/api/provider/orders/` + mobile)
      .then(res => res.json())
      .then(data => {
        const orders = data.success ? data.orders : [];
        document.getElementById('stat-orders').textContent = orders.length;
        document.getElementById('orders-count').textContent = `(${orders.length})`;
        
        let earn = 0;
        orders.forEach(o => { earn += parseFloat((o.Price || '0').toString().replace(/[^0-9.]/g, '')) || 0; });
        document.getElementById('stat-earnings').textContent = '₹' + earn.toLocaleString();

        const container = document.getElementById('orders-container');
        if (orders.length === 0) {
          container.innerHTML = '<div class="dash-card" style="justify-content:center;color:var(--text-muted);">No orders received yet.</div>';
        } else {
          container.innerHTML = orders.map(o => `
            <div class="dash-card">
              <div>
                <div style="color:var(--text-muted);font-size:0.7rem;">Order ID: ${o.OrderID} • ${o.OrderDate}</div>
                <h4 style="margin:0.25rem 0;">${o.Item}</h4>
                <p>Consumer: ${o.UserMobile} • Address: ${o.Address}</p>
                <div style="color:var(--accent-cyan);font-weight:700;margin-top:0.5rem;">Amount: ₹${o.Price}</div>
              </div>
              <div style="text-align:right;">
                <span class="status" style="background:rgba(234,179,8,0.1);color:#eab308;display:block;margin-bottom:0.5rem;" id="status-${o.OrderID}">${o.Status}</span>
                ${o.Status === 'Pending' ? `<button class="btn-primary" id="btn-${o.OrderID}" style="padding:0.4rem 0.8rem;font-size:0.7rem;" onclick="approveOrder('${o.OrderID}')">Approve</button>` : ''}
              </div>
            </div>
          `).join('');
        }
      });

    // 2. Load My Requests (User's consumer orders)
    fetch(`${API_BASE}/api/orders/` + mobile)
      .then(res => res.json())
      .then(data => {
        const requests = data.success ? data.orders : [];
        
        document.getElementById('stat-products').textContent = requests.length;
        document.getElementById('products-count').textContent = `(${requests.length})`;

        const container = document.getElementById('products-container');
        
        if (requests.length === 0) {
          container.innerHTML = '<div class="dash-card" style="justify-content:center;color:var(--text-muted);">No requests made yet.</div>';
        } else {
          container.innerHTML = [...requests].reverse().map(r => `
            <div class="dash-card">
              <div>
                <div style="color:var(--text-muted);font-size:0.7rem;">Order ID: ${r.OrderID} • ${r.OrderDate}</div>
                <h4 style="margin:0.25rem 0;">${r.Item}</h4>
                <p>Status: <span style="color:${r.Status === 'Pending' ? '#eab308' : '#22c55e'};">${r.Status}</span></p>
                <div style="color:var(--accent-cyan);font-weight:700;margin-top:0.5rem;">Price: ₹${r.Price}</div>
              </div>
              <div style="text-align:right;">
                <span class="status" style="background:rgba(59,130,246,0.1);color:#3b82f6;">Outgoing</span>
              </div>
            </div>
          `).join('');
        }
      });

    // 3. Approve Order Function
    window.approveOrder = (orderId) => {
      const btn = document.getElementById(`btn-${orderId}`);
      if (btn) { btn.textContent = 'Processing...'; btn.disabled = true; }

      fetch(`${API_BASE}/api/orders/${orderId}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: 'Accepted', providerMobile: mobile })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          const statusEl = document.getElementById(`status-${orderId}`);
          if (statusEl) {
            statusEl.textContent = 'Accepted';
            statusEl.style.color = '#22c55e';
            statusEl.style.background = 'rgba(34,197,94,0.1)';
          }
          if (btn) btn.remove();
          // Update stats
          const statOrders = document.getElementById('stat-orders');
          statOrders.textContent = Math.max(0, parseInt(statOrders.textContent) - 1);
        } else {
          alert('Failed to approve order');
          if (btn) { btn.textContent = 'Approve'; btn.disabled = false; }
        }
      })
      .catch(err => {
        console.error(err);
        alert('Network error while approving order');
        if (btn) { btn.textContent = 'Approve'; btn.disabled = false; }
      });
    };
  });


</script>
</body>
</html>
